name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: false

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  version:
    name: Compute version
    needs: check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      asset_upload_url: ${{ steps.release.outputs.asset_upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: calc
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            COUNT=$(git rev-list --count HEAD)
            TAG="v0.1.${COUNT}"
          fi
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Tag: ${TAG}"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: eci-linux-x86_64
            archive: eci-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: eci-linux-aarch64
            archive: eci-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: eci-darwin-x86_64
            archive: eci-darwin-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: eci-darwin-aarch64
            archive: eci-darwin-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: eci-windows-x86_64.exe
            archive: eci-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p eci

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/eci ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.archive }} ${{ matrix.artifact }}
          echo "ARCHIVE=${{ matrix.archive }}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/eci.exe" -Destination "${{ matrix.artifact }}"
          Compress-Archive -Path "${{ matrix.artifact }}" -DestinationPath "${{ matrix.archive }}"
          echo "ARCHIVE=${{ matrix.archive }}" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## easy-ci ${{ needs.version.outputs.tag }}

            ### Install via script (recommended)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/deyoyk/easy-ci/main/install.sh | bash
            ```

            ### Manual download
            Download the appropriate binary for your platform from the assets below.

            | Platform | Architecture | Archive |
            |----------|-------------|---------|
            | Linux | x86_64 | `eci-linux-x86_64.tar.gz` |
            | Linux | ARM64 | `eci-linux-aarch64.tar.gz` |
            | macOS | x86_64 | `eci-darwin-x86_64.tar.gz` |
            | macOS | ARM64 (Apple Silicon) | `eci-darwin-aarch64.tar.gz` |
            | Windows | x86_64 | `eci-windows-x86_64.zip` |
          files: artifacts/*

  docker:
    name: Build Docker image
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: eci-linux-x86_64.tar.gz
          path: .

      - name: Extract binary
        run: |
          tar xzf eci-linux-x86_64.tar.gz
          chmod +x eci-linux-x86_64
          mv eci-linux-x86_64 eci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            deyoyk/eci:${{ needs.version.outputs.version }}
            deyoyk/eci:latest
          platforms: linux/amd64
