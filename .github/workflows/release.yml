name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: eci-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: eci-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: eci-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: eci-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: eci-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p eci

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/eci ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/eci.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm/bin
          merge-multiple: true

      - name: Organize binaries
        run: |
          mkdir -p npm/bin/darwin/x86_64
          mkdir -p npm/bin/darwin/aarch64
          mkdir -p npm/bin/linux/x86_64
          mkdir -p npm/bin/linux/aarch64
          mkdir -p npm/bin/windows/x86_64

          mv npm/bin/eci-darwin-x86_64 npm/bin/darwin/x86_64/eci || true
          mv npm/bin/eci-darwin-aarch64 npm/bin/darwin/aarch64/eci || true
          mv npm/bin/eci-linux-x86_64 npm/bin/linux/x86_64/eci || true
          mv npm/bin/eci-linux-aarch64 npm/bin/linux/aarch64/eci || true
          mv npm/bin/eci-windows-x86_64.exe npm/bin/windows/x86_64/eci.exe || true

          chmod +x npm/bin/darwin/*/eci npm/bin/linux/*/eci

      - name: Update package version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd npm
          npm version $VERSION --no-git-tag-version

      - name: Publish to npm
        run: |
          cd npm
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
